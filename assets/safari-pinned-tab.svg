<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Safari renders mask-icon as monochrome filled paths. We draw the
       brand mark (square outline + S) as a single path so Safari tints
       it with the user's preferred accent color. -->
  <path fill-rule="evenodd" d="
    M 4 4 L 96 4 L 96 96 L 4 96 Z
    M 12 12 L 88 12 L 88 88 L 12 88 Z
    M 32 32 L 70 32 L 70 42 L 42 42 L 42 48 L 70 48 L 70 70 L 30 70 L 30 60 L 58 60 L 58 54 L 30 54 L 30 32 Z
  "/>
</svg>
